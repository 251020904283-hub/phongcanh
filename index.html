<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discover Vietnam</title>
    <link rel="stylesheet" href="style.css">
</head>

<body onload="addTabFocus()">

<header>
    <h1>Discover Vietnam</h1>
    <p>Explore the beauty of Vietnam through famous destinations.</p>
</header>

<main>

<div id="image">
    Hover over or focus on an image to learn more.
</div>

<div class="gallery">

<img src="1.jpg"

onmouseover="showInfo(this)"
onmouseleave="resetInfo()"
onfocus="showInfo(this)"
onblur="resetInfo()">

<img src="2.jpg"
alt="Hoi An Ancient Town"
onmouseover="showInfo(this)"
onmouseleave="resetInfo()"
onfocus="showInfo(this)"
onblur="resetInfo()">

<img src="3.jpg"
alt="Son Doong Cave"
onmouseover="showInfo(this)"
onmouseleave="resetInfo()"
onfocus="showInfo(this)"
onblur="resetInfo()">

<img src="4.jpg"
alt="Golden Bridge"
onmouseover="showInfo(this)"
onmouseleave="resetInfo()"
onfocus="showInfo(this)"
onblur="resetInfo()">

<img src="5.jpg"
alt="Mu Cang Chai"
onmouseover="showInfo(this)"
onmouseleave="resetInfo()"
onfocus="showInfo(this)"
onblur="resetInfo()">

<img src="6.jpg"
alt="Cai Rang Floating Market"
onmouseover="showInfo(this)"
onmouseleave="resetInfo()"
onfocus="showInfo(this)"
onblur="resetInfo()">

</div>

<script src="script.js"></script>

</main>

</body>
</html>
